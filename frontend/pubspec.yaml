name: yasamizi
description: "Yaşamİzi: Sağlık Takibi & Aile Koruyucusu (Master Spec Sheet)"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  file_picker: ^10.3.10
  flutter:
    sdk: flutter
  geolocator: ^14.0.2
  http: ^1.6.0
  image_picker: ^1.1.2
  url_launcher: ^6.3.2
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  # UI/UX ve Ekstra bileşenler için ileride eklenebilecekler:
  # cupertino_icons: ^1.0.2
  # google_fonts: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: "^0.13.1"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/logo.png
    - assets/logo_son_karar_ikon.png
    - assets/icons/
    - assets/bck.jpg
